name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheels
        run: |
          uv build --out-dir dist
          uv build --out-dir dist --package credstore

      - name: Install
        run: |
          uv pip install dist/slife-*.whl dist/credstore-*.whl
          uv pip install pytest pytest-asyncio pytest-cov pytest-xdist

      - name: Run tests
        run: uv run pytest -v --tb=short --no-header --maxfail=5
